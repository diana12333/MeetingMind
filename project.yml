name: MeetingMind
options:
  bundleIdPrefix: com.meetingmind
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

schemes:
  MeetingMind:
    build:
      targets:
        MeetingMind: all
        MeetingMindLiveActivity: all

  MeetingMindWatch:
    build:
      targets:
        MeetingMindWatch: all

targets:
  MeetingMind:
    type: application
    platform: iOS
    sources:
      - path: MeetingMind
    dependencies:
      - target: MeetingMindLiveActivity
    settings:
      base:
        INFOPLIST_FILE: MeetingMind/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingmind.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MeetingMind/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: MeetingMind
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "MeetingMind needs microphone access to record your meetings."
        NSSpeechRecognitionUsageDescription: "MeetingMind uses speech recognition to transcribe your meetings."
        NSCalendarsUsageDescription: "MeetingMind can add follow-up meetings to your calendar."
        NSRemindersUsageDescription: "MeetingMind can create reminders for your action items."
        UIBackgroundModes:
          - audio
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: "com.meetingmind.app.quick-record"
            UIApplicationShortcutItemTitle: "Record Meeting"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypeCapturePhoto"

  MeetingMindWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: MeetingMindWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingmind.app.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.meetingmind.app
        INFOPLIST_KEY_CFBundleDisplayName: MeetingMind
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: MeetingMindWatch/Resources/Info.plist
      properties:
        WKCompanionAppBundleIdentifier: com.meetingmind.app
        NSMicrophoneUsageDescription: "MeetingMind needs microphone access to record meetings on your Apple Watch."
        UIBackgroundModes:
          - audio

  MeetingMindLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: MeetingMindLiveActivity
      - path: MeetingMind/Models/MeetingRecordingAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingmind.app.live-activity
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MeetingMindLiveActivity
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
