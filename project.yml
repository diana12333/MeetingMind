name: MeetingMind
options:
  bundleIdPrefix: com.meetingmind
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  MeetingMind:
    type: application
    platform: iOS
    sources:
      - path: MeetingMind
    settings:
      base:
        INFOPLIST_FILE: MeetingMind/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingmind.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MeetingMind/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: MeetingMind
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "MeetingMind needs microphone access to record your meetings."
        NSSpeechRecognitionUsageDescription: "MeetingMind uses speech recognition to transcribe your meetings."
        NSCalendarsUsageDescription: "MeetingMind can add follow-up meetings to your calendar."
        NSRemindersUsageDescription: "MeetingMind can create reminders for your action items."
        UIBackgroundModes:
          - audio
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: "com.meetingmind.app.quick-record"
            UIApplicationShortcutItemTitle: "Record Meeting"
            UIApplicationShortcutItemIconType: "UIApplicationShortcutIconTypeCapturePhoto"
